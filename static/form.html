<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Get in Touch — Lead Portal</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --border: #334155;
    --success: #10b981;
    --error: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 { margin: 0 0 8px; font-size: 26px; font-weight: 700; }
  .subtitle { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #cbd5e1; }
  input, select {
    width: 100%;
    padding: 10px 12px;
    background: #0f172a;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
  }
  .field { margin-bottom: 16px; }
  button {
    width: 100%;
    padding: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }
  button:hover { background: var(--primary-hover); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .alert {
    padding: 10px 12px;
    border-radius: 8px;
    margin-top: 16px;
    font-size: 13px;
    display: none;
  }
  .alert.success {
    background: rgba(16,185,129,0.15);
    border: 1px solid var(--success);
    color: #6ee7b7;
    display: block;
  }
  .alert.error {
    background: rgba(239,68,68,0.15);
    border: 1px solid var(--error);
    color: #fca5a5;
    display: block;
  }
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--muted);
  }
  .footer a { color: var(--primary); text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Tell us about your project</h1>
    <p class="subtitle">We'll get back to you within one business day.</p>

    <form id="leadForm">
      <div class="row">
        <div class="field">
          <label for="first_name">First name</label>
          <input id="first_name" name="first_name" type="text" required autocomplete="given-name" />
        </div>
        <div class="field">
          <label for="last_name">Last name</label>
          <input id="last_name" name="last_name" type="text" required autocomplete="family-name" />
        </div>
      </div>

      <div class="field">
        <label for="email">Corporate email</label>
        <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@company.com" />
      </div>

      <div class="field">
        <label for="company">Company</label>
        <input id="company" name="company" type="text" required autocomplete="organization" />
      </div>

      <div class="field">
        <label for="budget">Estimated annual budget</label>
        <select id="budget" name="budget" required>
          <option value="">Select a range…</option>
          <option value="Under $10k">Under $10k</option>
          <option value="$10k-$50k">$10k–$50k</option>
          <option value="Greater than $50k">Greater than $50k</option>
        </select>
      </div>

      <button type="submit" id="submitBtn">Submit</button>
      <div id="alert" class="alert"></div>
    </form>

    <div class="footer">
      <a href="/dashboard">View internal dashboard →</a>
    </div>
  </div>

<script>
  const form = document.getElementById("leadForm");
  const alertBox = document.getElementById("alert");
  const submitBtn = document.getElementById("submitBtn");

  function showAlert(type, msg) {
    alertBox.className = "alert " + type;
    alertBox.textContent = msg;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    alertBox.className = "alert";
    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting…";

    const payload = Object.fromEntries(new FormData(form).entries());

    try {
      const res = await fetch("/api/leads", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) {
        showAlert("error", data.error || "Submission failed.");
      } else {
        showAlert("success", "Thanks! We've received your details.");
        form.reset();
      }
    } catch (err) {
      showAlert("error", "Network error. Please try again.");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit";
    }
  });
</script>
</body>
</html>
